<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Livraria da Fefê</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="cadastro-main">
    <h2>Criar nova conta</h2>
    <form id="cadastro-form">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>
      <label for="cpf">CPF:</label>
      <input type="text" id="cpf" name="cpf" required maxlength="14" placeholder="000.000.000-00">
      <label for="cep">CEP:</label>
      <input type="text" id="cep" name="cep" required maxlength="9" placeholder="00000-000">
      <label for="endereco">Endereço:</label>
      <input type="text" id="endereco" name="endereco" required readonly>
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" required>
      <label for="senha2">Confirmar Senha:</label>
      <input type="password" id="senha2" name="senha2" required>
      <button type="submit">Cadastrar</button>
    </form>
    <div class="login-links">
      <a href="login.html">Já tenho conta</a>
    </div>
  </main>
  <script src="/js/cadastro.js"></script>
</body>
</html>
